<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Test</title>
  <style>
    body { font-family: Arial; text-align: center; background: #000; color: white; margin: 0; }
    video { width: 100%; max-width: 640px; }
    button { padding: 15px 30px; font-size: 18px; margin: 20px; background: #00cc00; border: none; border-radius: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Camera Access</h2>
  <video id="video" autoplay playsinline></video><br>
  <button id="capture">📸 Take Photo</button>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let stream;

    // Request camera access
    navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "user" }  // front camera
    })
    .then(s => {
      stream = s;
      video.srcObject = stream;
    })
    .catch(err => {
      alert("Camera access denied or not available");
      console.error(err);
    });

    // Capture and send photo
    document.getElementById('capture').onclick = () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append('photo', blob, 'photo.jpg');

        // === CHANGE THIS TO YOUR OWN SERVER ===
        fetch('https://your-server.com/upload', {
          method: 'POST',
          body: formData
        })
        .then(() => alert('Photo sent successfully!'))
        .catch(() => alert('Failed to send photo'));
      }, 'image/jpeg', 0.9);
    };
  </script>
</body>
</html>
